name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build all packages
        run: npm run build:all

  integration-mock:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build mock server + CLI
        run: npm run build:mock && npm run build

      - name: Run integration tests (mock server)
        run: npm run test:integration

  integration-real:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run integration tests (real mpp.dev endpoint)
        run: npm run test:integration:real
        env:
          MPP_REAL_ENDPOINT_TESTS: "true"

  publish:
    runs-on: ubuntu-latest
    needs: [integration-mock, integration-real]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build:all

      - name: Publish CLI (must go first — plugin depends on it)
        run: npm publish --workspace=packages/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Mock Server
        run: npm publish --workspace=packages/mock-server --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for CLI to propagate on npm registry
        run: |
          echo "Waiting 60s for mpp-inspector to propagate on npm..."
          sleep 60
          npm view mpp-inspector@$(node -p "require('./packages/cli/package.json').version") version

      - name: Publish Plugin (depends on CLI being available on npm)
        run: npm publish --workspace=packages/plugin --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
